version: '3.9'

services:
  backend:
    build: ./backend
    container_name: cropsense_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cropsense_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
